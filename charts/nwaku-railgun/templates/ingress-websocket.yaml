{{- if .Values.ingress.websocket.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "nwaku-railgun.websocketServiceName" . }}
  labels:
    {{- include "nwaku-railgun.labels" . | nindent 4 }}
  {{- with .Values.ingress.websocket.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.websocket.className }}
  ingressClassName: {{ .Values.ingress.websocket.className }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.websocket.host | quote }}
      http:
        paths:
          - path: {{ .Values.ingress.websocket.path }}
            pathType: {{ .Values.ingress.websocket.pathType }}
            backend:
              service:
                name: {{ include "nwaku-railgun.websocketServiceName" . }}
                port:
                  name: websocket
  {{- if .Values.ingress.websocket.tls.enabled }}
  tls:
    - hosts:
        {{- if .Values.ingress.websocket.tls.hosts }}
        {{- range .Values.ingress.websocket.tls.hosts }}
        - {{ . | quote }}
        {{- end }}
        {{- else }}
        - {{ .Values.ingress.websocket.host | quote }}
        {{- end }}
      secretName: {{ .Values.ingress.websocket.tls.secretName }}
  {{- end }}
{{- end }}
